  <!-- Hat brim -->
  <ellipse cx="16" cy="22" rx="9" ry="2" fill="#3b1466"/>
  <ellipse cx="16" cy="22" rx="9" ry="2" fill="none" stroke="#7c3aed" stroke-width="0.4"/>

  <!-- Hat band -->
  <path d="M 12.3 16 L 19.7 16 L 19 18 L 13 18 Z" fill="#fbbf24"/>

  <!-- Tip bend -->
