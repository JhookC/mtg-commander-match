  <!-- Sparkle dots -->
  <circle cx="6" cy="9" r="0.8" fill="#fde68a"/>
  <circle cx="26" cy="11" r="0.6" fill="#fde68a"/>
  <circle cx="25" cy="6" r="0.5" fill="#fbbf24"/>
  <circle cx="7" cy="15" r="0.5" fill="#fbbf24"/>
</svg>
